<div class="sidebar-overlay"
     (click)="toggleMobile()"
     *ngIf="open() && isMobileScreen()">
</div>

<div class="sidebar" (mouseenter)="onMouseEnterSidebar()" (mouseleave)="onMouseLeaveSidebar()">
  <div class="sidebar-header">
    <div class="logo-section">
      <h3 class="logo">Sistema</h3>
      <p class="subtitle">PDV</p>
    </div>

    <button class="toggle-btn" (click)="toggleSidebar()" *ngIf="!isMobile()">
      <span [class.rotated]="collapsed()">⮜</span>
    </button>
  </div>

  <nav class="sidebar-nav">
    <ul>
     <li routerLink="/dashboard" routerLinkActive="active" (click)="toggleMobile()">
      <span class="icon">🏠</span>
      <span class="menu-text">Dashboard</span>
    </li>
    <li routerLink="/sales" routerLinkActive="active" (click)="toggleMobile()">
      <span class="icon">🛒</span>
      <span class="menu-text">Vendas</span>
    </li>
      <li routerLink="/pdv" routerLinkActive="active" (click)="toggleMobile()">
        <span class="icon">💳</span>
        <span class="menu-text">PDV</span>
      </li>
      <li routerLink="/products" routerLinkActive="active" (click)="toggleMobile()">
        <span class="icon">📦</span>
        <span class="menu-text">Produtos</span>
      </li>
      <li routerLink="/customers" routerLinkActive="active" (click)="toggleMobile()">
        <span class="icon">👥</span>
        <span class="menu-text">Clientes</span>
      </li>
      <li routerLink="/embroidery" routerLinkActive="active" (click)="toggleMobile()">
        <span class="icon">🧵</span>
        <span class="menu-text">Bordados</span>
      </li>
      <li routerLink="/cash" routerLinkActive="active" (click)="toggleMobile()">
        <span class="icon">💵</span>
        <span class="menu-text">Caixa</span>
      </li>

      <li routerLink="/payment" routerLinkActive="active" (click)="toggleMobile()">
        <span class="icon">⚙️</span>
        <span class="menu-text" *ngIf="!collapsed()">Configurações</span>
      </li>

      <li *ngIf="authService.isAdmin()" routerLink="/users" routerLinkActive="active">
        <mat-icon class="icon">manage_accounts</mat-icon>
        <span class="menu-text">Usuários</span>
      </li>
    </ul>
  </nav>

  <div class="user-area">
    <div class="user-info-group">
      <div class="avatar">{{ userInitial() }}</div>

      <div class="user-details">
        <span class="name">{{ userName() }}</span>
        <span class="role" *ngIf="user()?.role">{{ user()?.role }}</span>
      </div>
    </div>

    <button class="logout-btn" (click)="logout()" title="Sair">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</div>
