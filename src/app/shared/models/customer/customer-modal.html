<div class="modal-overlay" *ngIf="isOpen" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>Novo Cliente</h2>
      <button type="button" class="close-btn" (click)="closeModal()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <form (ngSubmit)="saveCustomer()" class="modal-form">

      <div class="form-group">
        <label for="name">Nome *</label>
        <input
          type="text"
          id="name"
          [(ngModel)]="formData().name"
          name="name"
          placeholder="Digite o nome do cliente"
          required
          [disabled]="isLoading()"
        >
        <small class="error" *ngIf="!formData().name && errorMessage()">
          {{ errorMessage() }}
        </small>
      </div>

      <div class="form-group">
        <label for="phone">Telefone *</label>
        <input
          type="tel"
          id="phone"
          [(ngModel)]="formData().phone"
          (ngModelChange)="updateField('phone', $event)"
          name="phone"
          placeholder="(00) 00000-0000"
          maxlength="15"
          required
          [disabled]="isLoading()"
        >
        <small class="hint">Formato: (00) 00000-0000</small>
      </div>

      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input
            type="checkbox"
            [(ngModel)]="formData().active"
            (ngModelChange)="updateField('active', $event)"
            name="active"
            [disabled]="isLoading()"
          >
          <span class="checkmark"></span>
          <span class="label-text">Cliente ativo</span>
        </label>
      </div>

      <div class="error-message" *ngIf="errorMessage()">
        <mat-icon>error</mat-icon>
        {{ errorMessage() }}
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="btn-cancel"
          (click)="closeModal()"
          [disabled]="isLoading()">
          Cancelar
        </button>
        <button
          type="submit"
          class="btn-save"
          [disabled]="!formData().name || !formData().phone || isLoading()">
          <mat-icon *ngIf="!isLoading()">person_add</mat-icon>
          <mat-icon *ngIf="isLoading()" class="spin">refresh</mat-icon>
          {{ isLoading() ? 'Salvando...' : 'Salvar Cliente' }}
        </button>
      </div>
    </form>
  </div>
</div>
