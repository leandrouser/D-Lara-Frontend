<div class="modal-overlay" *ngIf="isOpen" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>Novo Cliente</h2>
      <button type="button" class="close-btn" (click)="closeModal()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <form (ngSubmit)="saveCustomer()" class="modal-form">
      <div class="form-group">
        <label for="name">Nome *</label>
        <input
          type="text"
          id="name"
          [ngModel]="formData().name"
          (ngModelChange)="updateField('name', $event)"
          name="name"
          placeholder="Digite o nome do cliente"
          required
          [disabled]="isLoading()"
        >
      </div>

      <div class="form-group">
        <label for="phone">Telefone *</label>
        <input
          type="tel"
          id="phone"
          [ngModel]="formData().phone"
          (ngModelChange)="updateField('phone', $event)"
          name="phone"
          placeholder="(00) 00000-0000"
          maxlength="15"
          required
          [disabled]="isLoading()"
        >
        <small class="hint">Formato: (00) 00000-0000</small>
      </div>

      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input
            type="checkbox"
            [ngModel]="formData().active"
            (ngModelChange)="updateField('active', $event)"
            name="active"
            [disabled]="isLoading()"
          >
          <span class="label-text">Cliente ativo</span>
        </label>
      </div>

      <div class="error-container" *ngIf="errorMessage()">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage() }}</span>
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="btn-cancel"
          (click)="closeModal()"
          [disabled]="isLoading()">
          Sair
        </button>

        <button
          type="submit"
          class="btn-save"
          [class.loading]="isLoading()"
          [disabled]="!formData().name || !formData().phone || isLoading()">

          <ng-container *ngIf="!isLoading()">
            <mat-icon>person_add</mat-icon>
            Salvar e Continuar
          </ng-container>

          <ng-container *ngIf="isLoading()">
             <span class="spinner"></span> Salvando...
          </ng-container>
        </button>
      </div>
    </form>
  </div>
</div>
