name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Instalar dependencias
        run: |
          cd /d C:\projetos\Frontend
          npm install
      - name: Build Angular
        run: |
          cd /d C:\projetos\Frontend
          C:\Users\hlsil\AppData\Roaming\npm\ng.cmd build --configuration production
