name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Notificar maquina local
        run: |
          curl -X POST \
            -H 'Content-Type: application/json' \
            -H 'X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}' \
            -d '{"project": "frontend"}' \
            ${{ secrets.LOCAL_WEBHOOK_URL }}
