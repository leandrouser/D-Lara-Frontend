name: Deploy PDV Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Removemos o Node/Install/Build daqui pois você já faz isso direto na VPS.
      # Isso vai deixar o seu deploy muito mais rápido!

      - name: Deploy no VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            git config --global --add safe.directory /var/www/pdv
            cd /var/www/pdv
            
            # 1. Força o servidor a esquecer qualquer alteração local que trave o pull
            git reset --hard HEAD
            
            # 2. Puxa o código novo
            git pull origin main
            
            # 3. Instala e builda direto na máquina local
            npm install
            npx ng build --configuration=production
            
            # 4. Atualiza o servidor web
            sudo systemctl reload nginx