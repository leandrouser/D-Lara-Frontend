name: Deploy PDV Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Recriar environment de produção
        run: |
          printf 'export const environment = {\n  production: true,\n  apiUrl: "/api"\n};\n' > src/environments/environment.prod.ts

      - name: Build de produção
        run: npx ng build --configuration=production

      - name: Copiar dist para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/dlara-frontend/"
          target: "/var/www/pdv/dist/"
          strip_components: 1
          overwrite: true

      - name: Recarregar nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl reload nginx