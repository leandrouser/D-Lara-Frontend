name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Instalar dependencias
        run: npm install
      - name: Build Angular
        run: C:\Users\hlsil\AppData\Roaming\npm\ng.cmd build --configuration production
      - name: Copiar para NGINX
        run: xcopy /E /I /Y "dist\dlara-frontend\browser" "C:\nginx\html\pdv"
